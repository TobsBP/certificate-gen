<div class="d-flex flex-column align-items-center">
  <div class="content-title">
    <h1 class="fw-bold custom-title">Certificates generateds</h1>

    <p class="custom-subtitle mb-4">See all the certificates</p>
  </div>

  <div class="custom-card w-100">
    <h2 class="card-title">New Certificate</h2>
    <div class="mb-3">
      <label class="form-label">Name</label>
      <input type="text" class="form-control" placeholder="Student Name" />
    </div>
    <div class="mb-3 d-flex align-items-end">
      <div class="grow me-2">
        <label class="form-label">Activit</label>
        <input type="text" class="form-control" placeholder="Activate" />
      </div>
      <app-secondary-button></app-secondary-button>
    </div>
    <div class="activit-group">
      <label class="form-label">Activit</label>
      <div class="item-list w-100">
        <div class="item">
          <span class="item-text">New config</span>
          <div class="remove-btn">
            <i class="ph-bold ph-x"></i>
          </div>
        </div>
        <hr />
      </div>
    </div>

    <app-primary-button></app-primary-button>
  </div>
</div>
