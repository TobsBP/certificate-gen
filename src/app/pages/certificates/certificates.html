<div class="d-flex flex-column align-items-center">
  <div class="content-title">
    <h1 class="fw-bold custom-title">Generated Certificates</h1>
    <p class="custom-subtitle mb-4">See all generated certificates</p>
  </div>

  @if (certificates().length === 0) {
    <div class="custom-card empty-state w-100">
      <i class="ph ph-certificate cert-icon"></i>
      <div class="custom-warning-titles">
        <h3 class="card-title">No certificates yet</h3>
        <p class="card-subtitle">Generate certificates to see the history</p>
      </div>
    </div>
  } @else {
    <div class="cert-list w-100">
      @for (cert of certificates(); track cert.id) {
        <app-certificate-item [certificate]="cert"></app-certificate-item>
      }
    </div>
  }
</div>
