<div class="cert-hidden" #certEl>
  <app-certificate-template [certificate]="certificate()"></app-certificate-template>
</div>

<div class="card p-3">
  <div class="d-flex justify-content-between align-items-center">
    <div>
      <div class="fw-bold student-name">{{ certificate().studentName }}</div>
      <small class="small-date">Generated in: {{ certificate().generatedAt | date: 'dd/MM/yyyy' }}</small>
    </div>
    <div class="d-flex gap-2">
      <button class="btn-action btn-download" (click)="download()" title="Download">
        <i class="ph ph-download-simple"></i>
      </button>
      <button class="btn-action btn-remove" (click)="remove()" title="Remove">
        <i class="ph ph-trash-simple"></i>
      </button>
    </div>
  </div>
</div>
